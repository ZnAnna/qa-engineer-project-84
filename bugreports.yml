- summary: |
    Некорректная фильтрация товаров по диапазону цен при ручном вводе значений с клавиатуры
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. Открыта страница https://products-store.hexlet.app/
    2. Найти блок "Price" с полями "From" и "To"
    3. Кликнуть в поле "From"
    4. Ввести с клавиатуры значение 10
    5. Кликнуть в поле "To"
    6. Ввести с клавиатуры значение 15
    7. Фильтрация применяется автоматически или кликнуть вне поля для применения
    8. Проверить список отображаемых товаров
  expected-result: |
    Отображаются товары с ценой от $10 до $15 включительно. Товары с ценой ниже $10 и выше $15 не отображаются
  actual-result: |
    Отображается товар с ценой ниже $10 (Dog food $9.86)

- summary: |
    Некорректная фильтрация товаров по диапазону цен с использованием кнопок-стрелок вверх/вниз
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. Открыта страница https://products-store.hexlet.app/
    2. Найти блок "Price" с полями "From" и "To"
    3. В поле "From" нажимать кнопку со стрелкой вверх, пока не установится значение 20
    4. В поле "To" нажимать кнопку со стрелкой вверх, пока не установится значение 30
    5. Фильтрация применяется автоматически или кликнуть вне поля для применения
    6. Проверить список отображаемых товаров
  expected-result: |
    Отображаются товары с ценой от $20 до $30 включительно. Товары с ценой ниже $20 и выше $30 не отображаются
  actual-result: |
    На первой странице не отображаются товары. Для отображения нужно перейти на вторую страницу

