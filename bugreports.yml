---
- summary: |
    После обновления страницы очищенная корзина не сохраняется
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. На главной странице https://products-store.hexlet.app/ добавить товар в корзину
    2. Нажать на корзину в верхнем правом углу
    3. Нажать на кнопку Clear cart
    4. Убедиться, что товар из корзины удален
    5. Обновить страницу
  expected-result: |
    После обновления страницы очищенная корзина остается пустой
  actual-result: |
    После обновления страницы удаленные из корзины товары вновь попадают в корзину

---
- summary: |
    Корректность расчета итоговой суммы в строке товара при количестве больше 1
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. На главной странице https://products-store.hexlet.app/ добавить 2 одинаковых товара в корзину
    2. Зафиксировать стоимость 1 товара и умножить на 2
    3. Нажать на корзину в верхнем правом углу
    4. Проверить стоимость 2 товаров и сумму из шага 2
  expected-result: |
    Сумма двух товаров и цена в корзине должна быть одинаковая
  actual-result: |
    Стоимость в корзине выше, чем сумма цены 2 товаров

---
- summary: |
    Корректность расчета общего Total при наличии нескольких товаров
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. На главной странице https://products-store.hexlet.app/ добавить 2 разных товара в корзину
    2. Зафиксировать стоимость каждого добавленного товара
    3. Нажать на корзину в верхнем правом углу
    4. Проверить сумму Total 2 товаров и сумму из шага 2
  expected-result: |
    Сумма разных товаров и цена в корзине должна быть одинаковая
  actual-result: |
    Сумма Total в корзине выше, чем сумма цены 2 разных товаров

---
- summary: |
    Функциональность иконки "крест" в списке товаров Checkout
  environment: |
    Google Chrome 146.0.7680.153 (официальная сборка) (64 бит)
    ОС Windows 11
  steps-to-reproduce: |
    1. На главной странице https://products-store.hexlet.app/ добавить любой товар в корзину
    2. Нажать на корзину в верхнем правом углу
    3. Нажать на кнопку Checkout над списком товаров
    4. Открывается окно со списком товаров в корзине
    5. Нажать на иконку "крест" для закрытия окна
    6. Окно со списком закрывается
  expected-result: |
    Окно Checkout со списком товаров в корзине закрывается при нажатии на иконку "крест"
  actual-result: |
    Окно Checkout со списком товаров в корзине не закрывается при нажатии на иконку "крест"
