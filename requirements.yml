functional:
  - Пользователь должен иметь возможность искать товары по ключевому слову или категории
  - Пользователь должен иметь возможность фильтровать товары
  - Пользователь должен иметь возможность просматривать товары и просматривать подробную информацию о товаре
  - Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  - Пользователь должен иметь возможность оформить заказ
  - Пользователь должен иметь оплатить товары
  - Пользователь должен иметь возможность переключить язык интерфейса
  - Сайт должен иметь локализацию (перевод) на русский и английский языки
  - В каталоге и на странице товара отображается стоимость товара со скидкой и без, рейтинг товара
  - В каталоге должен быть реализован постраничный вывод товаров
  - На странице корзины пользователь должен иметь возможность удалить товар из корзины
  - Пользователь должен иметь возможность вернуться в каталог из корзины
  - Корзина должна храниться в сессии браузера (содержимое не теряется при перезагрузке страницы)
non-functional:
  - Сайт нужно разработать с учетом удобства использования и оптимизировать для скорости работы
  - Сайт должен быть безопасным и защищать данные пользователя
  - Сайт должен иметь мобильную версию
  - Сайт нужно протестировать на совместимость с последними версиями браузеров
  - Важно, чтобы сайт мог обрабатывать большое количество трафика
  - Сайт должен быть доступен на различных устройствах
  - Сайт должен быть доступен для пользователей без использования VPN (прямой доступ из сети Интернет)
  - Сайт должен быть реализован как SPA-приложение, которое не перезагружает страницу целиком при навигации
  - Сайт должен иметь адаптивную верстку для удобного использования на мобильных устройствах
implicit:
  - Сайт должен быть доступен для людей с ограниченными возможностями
  - Разделы сайта должны быть интуитивно понятными
  - Сайт должен содержать юридическую и правовую информацию
  - При разрыве интернет-соединения пользователю должна отображаться информация об ошибке
  - При вводе некорректного запроса в поиске магазина пользователь должен видеть сообщение об ошибке
