- summary: |
    Ограничение добавления товара в корзину: нельзя добавить больше, чем доступный остаток
  requirement: |
    При добавлении товара в корзину количество не может превышать доступный остаток (stock). например, если остаток составляет 4 единицы, пользователь не может добавить 5-й товар.
  prerequisites: |
    Открыта карточка любого товара, указан остаток
  test-data: |
    Любой товар с указанным остатком
  steps:
    - Добавить в корзину такое количество товара, которое указано на остатке
    - Перейти в корзину, убедиться, что количество товара соответсвует остатку
    - Вернуться на страницу товара (или на главную)
    - Попробовать добавить товар в корзину еще 1 раз
    - Проверить, добавилась ли еще 1 шт товара
  expected-result: |
    При попытке добавить товар сверх оставшего лимита количество товаров в корзине не увеличивается. Счетчик у корзины не увеличивается

- summary: |
    Синхронизация ограничения остатка при добавлении товара с разных страниц
  requirement: |
    Если пользователь добавляет товар с главной страницы и с карточки товара, ограничение по остатку должно работать одинаково и синхронизироваться
  prerequisites: |
    Корзина пуста. Выбран любой товар и указан остаток
  test-data: Любой товар с указанным остатком
  steps:
    - На главной странице добавить любой товар, не достигнув лимита остатка
    - Перейти в корзину, проверить добавленное количество
    - Вернуться на главную, перейти на карточку товара
    - Добавить товар из карточки, достигнув лимита
    - Попробовать добавить товар сверх лимита
  expected-result: |
    При попытке добавить товар сверх лимита из каталога или карточки товара добавление не происходит. Лимит остатка соблюдается независимо от источника добавления

