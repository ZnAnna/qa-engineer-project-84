    - В поле "To" нажимать кнопку со стрелкой вверх, пока не установится значение 30
    - Фильтрация применяется автоматически или кликнуть вне поля для применения
    - Проверить список отображаемых товаров
  expected-result: |
    Отображаются товары с ценой от $20 до $30 включительно. Товары с ценой ниже $20 и выше $30 не отображаются

