- summary: |
    Фильтрация по цене: очистка поля и сброс фильтра
  requirement: |
    Если пользователь очищает поле "From" или "To" (удаляет значение), фильтр по этому полю должен сбрасываться. Нижняя или верхняя граница не должна применяться
  prerequisites: |
    Открыта главная страница https://products-store.hexlet.app/. Установлен фильтр: From = 10, To = 20
  test-data: |
    From = пусто, To = 20
  steps:
    - Очистить поле "From" (удалить значение 10)
    - Фильтрация применяется автоматически или кликнуть вне поля для применения
    - Проверить список отображаемых товаров
    - Очистить поле "To"
    - Фильтрация применяется автоматически или кликнуть вне поля для применения
    - Проверить список отображаемых товаров
  expected-result: |
    После очистки поля "From": фильтр по нижней границе сброшен. Отображаются товары с ценой до $20 (без нижнего ограничения)
    После очистки поля "To": фильтр по верхней границе сброшен. Отображаются все товары (без ограничений)
