- summary: |
    Загрузка страницы интернет-магазина https://products-store.hexlet.app/
  requirement: |
    Сайт магазина загружается на устройстве, отображатся разделы, товары
  prerequisites: |
    Открыт браузер
  test-data: " "
  steps:
    - В адресной строке браузера ввести https://products-store.hexlet.app/
    - Нажать Enter
    - Дождаться полной загрузки страницы
  expected-result: |
    Страница загрузилась. Отображается список товаров (карточки с изображениями, названиями и ценами). Доступны кнопки "Add to cart" и навигационные элементы Store/Cart/Language

- summary: Переход в каталог по кнопке
  requirement: |
    При нажатии на кнопку Store открывается главная страница сайта
  prerequisites: |
    Открыта главная страница магазина https://products-store.hexlet.app/
  test-data: " "
  steps:
    - Нажать на карточку любого товара на главной странице
    - Нажать на кнопку Store в верхнем правом углу для возврата на главную страницу сайта
  expected-result: |
    Пользователь должен попасть на главную страницу https://products-store.hexlet.app/

- summary: |
    Переход в корзину по кнопке
  requirement: |
    При нажатии на кнопку Cart открывается корзина
  prerequisites: |
    Открыта любая страница сайта (главная, карточка товара)
  test-data: " "
  steps:
    - Нажать на кнопку Cart в верхнем правом углу для открытия корзины магазина
  expected-result: |
    Открывается страница корзины. URL содержит /cart.

- summary: |
    Удаление всех товаров из корзины
  requirement: |
    При нажатии на кнопку Clear cart корзина полностью очищается
  prerequisites: |
    В корзину добавлен товар
  test-data: " "
  steps:
    - Нажать на кнопку Cart в верхнем правом углу для открытия корзины магазина
    - Нажать на кнопку Clear cart
  expected-result: |
    Корзина полностью очищается от товаров

- summary: |
    Переход в каталог по кнопке из корзины
  requirement: |
    При нажатии на кнопку Continue shopping открывается главная страница https://products-store.hexlet.app/
  prerequisites: |
    Открыта страница корзины (с товарами или пустая)
  test-data: " "
  steps:
    - Нажать на кнопку Cart в верхнем правом углу для открытия корзины магазина
    - Нажать на кнопку Continue shopping
  expected-result: |
    Пользователь должен попасть на главную страницу https://products-store.hexlet.app/

- summary: |
    Добавление товара в корзину
  requirement: |
    При нажатии на кнопку Add to cart товар добавляется в корзину
  prerequisites: |
    Открыта главная страница https://products-store.hexlet.app/
  test-data: " "
  steps:
    - Нажать на кнопку Add to cart для добавления любого товара в корзину
    - Перейти в корзину
  expected-result: |
    В корзине отображается добавленный товар. Количество товара равно 1

- summary: |
    Проверка счетчика у корзины при добавлении товара
  requirement: |
    При нажатии на кнопку Add to cart обновляется счетчик количества товаров в корзине
  prerequisites: |
    Корзина пуста. Счетчика около корзины нет. Открыта главная страница https://products-store.hexlet.app/
  test-data: " "
  steps:
    - Нажать Add to cart на первом товаре
    - Проверить значение счетчика у кнопки Cart
    - Нажать Add to cart на втором товаре
    - Проверить значение счетчика у кнопки Cart
  expected-result: |
    После первого добавления счетчик показывает "1". После второго добавления счетчик показывает "2"

- summary: |
    Проверка счетчика у корзины при удалении товара из корзины
  requirement: |
    При нажатии на кнопку Delete обновляется счетчик количества товаров в корзине
  prerequisites: |
    В корзине находится 2 товара (добавлены через главную страницу). Открыта страница корзины
  test-data: |
    Два любых товара
  steps:
    - Зафиксировать значение счетчика у кнопки Cart в хедере (должно быть "2")
    - Нажать на кнопку Delete в строке с одним из товаров
    - Проверить значение счетчика у кнопки Cart
  expected-result: |
    Счетчик уменьшился на 1 и теперь показывает "1". Удаленный товар отсутствует в корзине

- summary: |
    Проверка счетчика у корзины при 99+ товаров
  requirement: |
    При добавлении 100 и более товаров счетчик показывает точное количество
  prerequisites: |
    В корзине находится 99 товаров (добавлены через главную страницу). Открыта главная страница
  test-data: " "
  steps:
    - Зафиксировать значение счетчика у кнопки Cart в хедере (должно быть "99")
    - Нажать Add to cart на любом товаре
    - Проверить значение счетчика у кнопки Cart
  expected-result: |
    Счетчик отображает точное количество товаров в корзине

- summary: |
    Сохранение пустой корзины после обновления страницы
  requirement: |
    После очистки корзины и перезагрузки страницы корзина должна оставаться пустой.
  prerequisites: |
    В корзину добавлен хотя бы один товар. Открыта страница корзины
  test-data: " "
  steps:
    - Нажать на кнопку Clear cart для очистки корзины
    - Убедиться, что корзина стала пустой
    - Обновить страницу (нажать F5 или кнопку обновления в браузере)
    - Дождаться полной перезагрузки страницы
  expected-result: |
    После обновления страницы корзина остается пустой. Ранее удаленные товары не восстановились. Счетчик на кнопке Cart отсутствует

- summary: |
    Удаление товара из корзины
  requirement: |
    При нажатии на кнопку Delete в строке с товаром товар удаляется из корзины
  prerequisites: |
    В корзине находится 2 товара (добавлены через главную страницу). Открыта страница корзины
  test-data: " "
  steps:
    - Нажать на кнопку Delete в строке с одним из товаров
  expected-result: |
    Товар удален из корзины

- summary: |
    Корректность расчета итоговой суммы в строке товара при количестве больше 1
  requirement: |
    При добавлении нескольких единиц одного товара в строке корзины должна отображаться итоговая сумма за этот товар (цена × количество)
  prerequisites: |
    Открыта главная страница магазина. Корзина пуста
  test-data: |
    Любой товар, остаток товара более 1 штуки
  steps:
    - Добавить любой товар в корзину 2 раза
    - Перейти в корзину (нажать на кнопку Cart)
    - Проверить отображаемую сумму в строке товара
  expected-result: |
    В строке товара отображается сумма, равная цене товара х количество

- summary: |
    Корректность расчета суммы корзины при наличии нескольких товаров
  requirement: |
    Общая сумма (Total) в корзине должна равняться сумме итоговых сумм всех строк товаров
  prerequisites: |
    Открыта главная страница магазина. Корзина пуста
  test-data: |
    2 разных товара
  steps:
    - Добавить любой товар в корзину 1 раз
    - Добавить другой товар в корзину 1 раз
    - Перейти в корзину (нажать на кнопку Cart)
    - Зафиксировать сумму в строке с первым товаром
    - Зафиксировать сумму в строке со вторым товаром
    - Сложить эти суммы
    - Сравнить полученную сумму с отображаемым Total
  expected-result: |
    Сумма товаров в корзине равна сумме строк цена товара 1 + цена товара 2

- summary: |
    Пересчет суммы в строке товара и общей суммы корзины при изменении количества
  requirement: |
    При увеличении или уменьшении количества товара в корзине должны пересчитываться сумма в строке товара и общая сумма корзины
  prerequisites: |
    Открыта главная страница магазина. Корзина пуста
  test-data: Любой товар
  steps:
    - Добавить любой товар в корзину 1 раз
    - Перейти в корзину
    - Зафиксировать сумму в строке товара и общую сумму корзины
    - Вернуться в карточку этого же товара для добавления еще 1 шт
    - Проверить сумму в строке товара
    - Проверить общую сумму корзины
  expected-result: |
    После изменения количества:
    - Сумма в строке товара изменилась цена товара х количество
    - Общий Total изменился цена товара х количество

- summary: |
    Оформление заказа
  requirement: |
    При нажатии на кнопку Checkout открывается дополнительное окно со списком товаров в корзине, их наименованием, количеством, стоимостью и итоговой суммой
  prerequisites: |
    В корзине находится 2 товара (добавлены через главную страницу). Открыта страница корзины
  test-data: 2 любых товара
  steps:
    - Нажать на кнопку Checkout над списком товаров
  expected-result: |
    Открывается дополнительное окно со списком товаров в корзине, их наименованием, количеством, стоимостью и итоговой суммой

- summary: |
    Функциональность кнопки Close в списке товаров Checkout
  requirement: |
    При нажатии на кнопку Close дополнительное окно закрывается
  prerequisites: |
    В корзине находится 2 товара (добавлены через главную страницу). Открыта страница корзины. Открыто дополнительное окно по кнопке Checkout
  test-data: " "
  steps:
    - Нажать на кнопку Close под списком товаров
  expected-result: |
    Дополнительное окно закрывается. Отображается корзина со списком товаров

- summary: |
    Функциональность иконки "крест" в списке товаров Checkout
  requirement: |
    При нажатии на иконку "крест" дополнительное окно закрывается
  prerequisites: |
    В корзине находится 2 товара (добавлены через главную страницу). Открыта страница корзины. Открыто дополнительное окно по кнопке Checkout
  test-data: " "
  steps:
    - Нажать на иконку "крест" над списком товаров
  expected-result: |
    Дополнительное окно закрывается. Отображается корзина со списком товаров

- summary: |
    Переход из корзины на карточку товара с проверкой соответствия данных
  requirement: |
    Строка товара в корзине должна быть кликабельной. При клике на нее должен открываться страница этого товара. Название, цена и доступное к заказу количество товара на карточке должны соответствовать данным, отображаемым в корзине
  prerequisites: |
    В корзину добавлен товар (Powder Canister). Открыта страница корзины
  test-data: " "
  steps:
    - Зафиксировать название, цену и доступное к заказу количество товара в строке корзины
    - Нажать на любую область строки товара
    - Дождаться загрузки страницы товара
    - Сравнить название товара на открывшейся странице с названием из корзины
    - Сравнить цену товара на открывшейся странице с ценой из корзины
    - Сравнить доступное к заказу количество товара с количеством из корзины
  expected-result: |
    После клика открывается карточка товара "Powder Canister". Название товара совпадает с названием в корзине. Цена товара совпадает с ценой в корзине. Доступное к заказу количество товара соответствует количеству, указанному в корзине

- summary: |
    Переключение языка интерфейса на Русский
  requirement: |
    При выборе языка "Русский" из выпадающего списка все элементы интерфейса (названия кнопок, заголовки, текст) должны отображаться на русском языке
  prerequisites: |
    Открыта главная страница https://products-store.hexlet.app/. Язык интерфейса установлен на English
  test-data: |
    Язык: Russian
  steps:
    - Нажать на переключатель языка в верхнем правом углу
    - Выбрать "Russian" из выпадающего списка
    - Дождаться обновления страницы (или динамической смены языка)
    - Проверить текст на кнопках "Store", "Cart"
    - Проверить текст на кнопках "Add to cart" у товаров
    - Проверить текст фильтров ("Category", "Brand", "In Stock", "Price")
  expected-result: |
    Кнопка Store → "Магазин" или "Главная"
    Кнопка Cart → "Корзина"
    Кнопка Add to cart → "В корзину" или "Добавить в корзину"
    Фильтры отображаются на русском языке
    Названия товаров на русском языке
    Описания товаров на русском языке

