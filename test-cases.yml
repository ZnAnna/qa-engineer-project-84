- summary: |
    Фильтрация товаров по диапазону цен с использованием кнопок-стрелок вверх/вниз
  requirement: |
    Поля "From" и "To" должны поддерживать изменение значений с помощью кнопок-стрелок. При изменении значений должна применяться фильтрация, отображающая товары с ценой в указанном диапазоне
  prerequisites: |
